name: Update Go version

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-go-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Update go version in go.mod
        run: go get go@$(go env GOVERSION | sed 's/go//')

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(deps): update go version"
          title: "chore(deps): update go version"
          body: |
            Automated go version updates.
          branch: update-go-version
          labels: dependencies
